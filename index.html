<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <title>NoteForge</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("noteforge:theme-mode");
          var dark =
            m === "dark" ||
            (m !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var bg = dark ? "#0d1117" : "#ffffff";
          var fg = dark ? "#e6edf3" : "#1f2328";
          var accent = dark ? "#58a6ff" : "#0969da";
          var root = document.documentElement;
          root.classList.add(dark ? "dark" : "light");
          root.style.colorScheme = dark ? "dark" : "light";
          root.style.backgroundColor = bg;
          var splash = document.getElementById("static-boot-splash");
          if (splash) {
            splash.style.background = bg;
            splash.style.color = fg;
            var logo = splash.querySelector("[data-boot-logo]");
            if (logo) logo.style.background = accent;
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d1117;
      }
      html.light,
      html.light body {
        background: #ffffff;
      }
      html.dark,
      html.dark body {
        background: #0d1117;
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <div id="root">
      <div
        id="static-boot-splash"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #0d1117;
          color: #e6edf3;
          font-family: system-ui, -apple-system, sans-serif;
        "
        aria-hidden="true"
      >
        <div
          data-boot-logo
          style="
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: #0969da;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
          "
        >
          N
        </div>
        <div style="margin-top: 24px; font-size: 22px; font-weight: 600">NoteForge</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
