<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <title>NoteForge</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("noteforge:theme-mode");
          var dark =
            m === "dark" ||
            (m !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.add(dark ? "dark" : "light");
          root.style.colorScheme = dark ? "dark" : "light";
          root.style.backgroundColor = dark ? "#0d1117" : "#ffffff";
        } catch (e) {}
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d1117;
      }
      html.light,
      html.light body {
        background: #ffffff;
      }
      html.dark,
      html.dark body {
        background: #0d1117;
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
